<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Create Quiz</title>

  <link rel="stylesheet" href="css/create-quiz.css">
</head>

<body>

<div class="container">

  <h1>Create Quiz</h1>

  <form id="quizForm">

    <input
      type="text"
      id="title"
      placeholder="Quiz Title"
      required
    >

    <input
      type="text"
      id="subject"
      placeholder="Subject"
      required
    >

    <input
      type="number"
      id="timer"
      placeholder="Quiz Timer (minutes)"
      required
    >

    <div id="questionsContainer"></div>

    <button
      type="button"
      id="addQuestionBtn"
    >
      Add Question
    </button>

    <button type="submit">
      Save Quiz
    </button>

  </form>

</div>

<script src="js/create-quiz.js"></script>

</body>
</html>
