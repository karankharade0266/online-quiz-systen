<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Quiz Card
  </title>

  <link
    rel="stylesheet"
    href="../css/components.css"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

</head>

<body>

<div class="quiz-card">

  <!-- QUIZ IMAGE -->

  <div class="quiz-image">

    <i class="fa-solid fa-book-open"></i>

  </div>

  <!-- QUIZ DETAILS -->

  <div class="quiz-content">

    <h2>
      JavaScript Quiz
    </h2>

    <p>
      Test your JavaScript knowledge
      with beginner to advanced
      level questions.
    </p>

    <!-- QUIZ INFO -->

    <div class="quiz-info">

      <span>

        <i class="fa-solid fa-clock"></i>

        20 Minutes

      </span>

      <span>

        <i class="fa-solid fa-question"></i>

        15 Questions

      </span>

    </div>

    <!-- BUTTON -->

    <button>

      Start Quiz

    </button>

  </div>

</div>

</body>
</html>
